<svg width="1000" height="220" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1437"/>
      <stop offset="55%" stop-color="#15275C"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <style>
      .name { font: 700 46px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #F8FAFC; }
      .role { font: 600 21px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #93C5FD; }
      .loc  { font: 400 15px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #94A3B8; }
      .dot  { animation: pulse 2.4s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity:0.25 } 50% { opacity:1 } }
    </style>
  </defs>

  <rect width="1000" height="220" rx="18" fill="url(#bg)"/>

  <!-- floating accent orbs -->
  <circle cx="880" cy="50" r="60" fill="#38BDF8" opacity="0.10">
    <animate attributeName="cy" values="50;70;50" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="940" cy="160" r="40" fill="#818CF8" opacity="0.12">
    <animate attributeName="cy" values="160;140;160" dur="5s" repeatCount="indefinite"/>
  </circle>

  <text x="50" y="92" class="name">Musheb Maniyar</text>
  <rect x="52" y="108" width="0" height="3" rx="2" fill="url(#accent)">
    <animate attributeName="width" values="0;430" dur="1.4s" fill="freeze"/>
  </rect>

  <text x="52" y="142" class="role">Co-Founder, medicAI</text>
  <text x="52" y="172" class="loc">Building AI-native infrastructure for healthcare &amp; insurance access in MENA</text>

  <circle cx="60" cy="196" r="5" fill="#22C55E" class="dot"/>
  <text x="74" y="201" class="loc">Dubai, UAE · Open to investor &amp; founder conversations</text>
</svg>
